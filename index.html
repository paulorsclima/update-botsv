<!-- ═══════════════════════════════════════════════
     MODAL EXPORTAÇÃO — VENDAS (script)
     ═══════════════════════════════════════════════ -->
<script>
(function(){
  const PS_EXP_V = 50;
  let _expVDados        = [];
  let _expVSelecionados = new Set();
  let _expVPage         = 0;

  function fmtN(v){ return (v||0).toLocaleString('pt-BR'); }
  function fmt(v){ return 'R$ '+(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }

  function curvaSpanExpV(c){
    if(c==='A') return '<span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:#0d2618;color:#34d399;">A</span>';
    if(c==='B') return '<span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:#1a2f0d;color:#84cc16;">B</span>';
    return '<span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:#1e2535;color:#8892a4;">C</span>';
  }

  window.abrirModalExportVendas = function(){
    document.getElementById('exportVendasOverlay').style.display = 'flex';
    document.getElementById('exportVendasFiltroCurva').value = '';
    document.getElementById('exportVendasBusca').value       = '';
    _expVSelecionados.clear();
    renderExportVendasList(0);
  };

  window.fecharModalExportVendas = function(e){
    if(!e || e.target === document.getElementById('exportVendasOverlay'))
      document.getElementById('exportVendasOverlay').style.display = 'none';
  };

  function _getSourceData(){
    return (window._currentVendas || DATA.produtos || []).slice();
  }

  window.renderExportVendasList = function(pg){
    _expVPage = pg || 0;
    const curvaFiltro = document.getElementById('exportVendasFiltroCurva').value;
    const busca = (document.getElementById('exportVendasBusca').value || '').toLowerCase();

    _expVDados = _getSourceData().filter(p => {
      if(curvaFiltro && p.curva !== curvaFiltro) return false;
      if(busca && !(p.SKU||'').toLowerCase().includes(busca) && !(p.produto||'').toLowerCase().includes(busca)) return false;
      return true;
    });

    const total = _expVDados.length;
    const slice = _expVDados.slice(_expVPage*PS_EXP_V, (_expVPage+1)*PS_EXP_V);

    document.getElementById('exportVendasBody').innerHTML = slice.map(p => {
      const checked = _expVSelecionados.has(p.SKU) ? 'checked' : '';
      const ticket  = p.qtd > 0 ? fmt(p.receita / p.qtd) : '—';
      return `
        <tr style="border-top:1px solid #1a2030;cursor:pointer;" onclick="exportVendasToggleLine('${p.SKU}')">
          <td style="text-align:center;padding:8px 10px;">
            <input type="checkbox" data-sku="${p.SKU}" ${checked}
              onclick="event.stopPropagation();exportVendasToggleLine('${p.SKU}')"
              style="accent-color:#6366f1;width:14px;height:14px;cursor:pointer;">
          </td>
          <td style="padding:8px;font-size:11px;font-weight:700;color:#6366f1;white-space:nowrap;">${p.SKU}</td>
          <td style="padding:8px;font-size:11px;color:#c0c9d9;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${p.produto||''}">${p.produto||'-'}</td>
          <td style="padding:8px;text-align:center;">${curvaSpanExpV(p.curva||'C')}</td>
          <td style="padding:8px;font-size:11px;color:#c0c9d9;text-align:right;">${fmtN(p.qtd||0)}</td>
          <td style="padding:8px;font-size:12px;font-weight:700;color:#34d399;text-align:right;">${fmt(p.receita||0)}</td>
          <td style="padding:8px;font-size:11px;color:#c0c9d9;text-align:right;">${ticket}</td>
          <td style="padding:8px;font-size:11px;color:#c0c9d9;text-align:right;">${(p.vd||0).toFixed(2)}/dia</td>
          <td style="padding:8px;font-size:11px;color:#c0c9d9;text-align:right;">${p.cobertura||0} dias</td>
          <td style="padding:8px;font-size:11px;color:#c0c9d9;text-align:right;">${fmtN(p.estoque||0)}</td>
        </tr>`;
    }).join('');

    const todosNaPagina = slice.every(p => _expVSelecionados.has(p.SKU));
    document.getElementById('exportVendasCheckAll').checked       = slice.length > 0 && todosNaPagina;
    document.getElementById('exportVendasCheckAll').indeterminate = !todosNaPagina && slice.some(p => _expVSelecionados.has(p.SKU));

    _buildExportVendasPag(total, _expVPage);
    document.getElementById('exportVendasSubtitle').textContent =
      `${total} produto(s) encontrado(s) · ${_expVSelecionados.size} selecionado(s)`;
    _atualizarPreviewVendas();
  };

  window.exportVendasToggleLine = function(sku){
    _expVSelecionados.has(sku) ? _expVSelecionados.delete(sku) : _expVSelecionados.add(sku);
    renderExportVendasList(_expVPage);
  };
  window.exportVendasToggleAll = function(c){
    const sl = _expVDados.slice(_expVPage*PS_EXP_V, (_expVPage+1)*PS_EXP_V);
    sl.forEach(p => c ? _expVSelecionados.add(p.SKU) : _expVSelecionados.delete(p.SKU));
    renderExportVendasList(_expVPage);
  };
  window.exportVendasSelecionarTudo = function(){
    _expVDados.forEach(p => _expVSelecionados.add(p.SKU));
    renderExportVendasList(_expVPage);
  };
  window.exportVendasLimparTudo = function(){
    _expVSelecionados.clear();
    renderExportVendasList(_expVPage);
  };

  function _buildExportVendasPag(total, pg){
    const el = document.getElementById('exportVendasPag');
    const totalPages = Math.ceil(total / PS_EXP_V);
    if(totalPages <= 1){ el.innerHTML = ''; return; }
    const s = pg*PS_EXP_V+1, e = Math.min((pg+1)*PS_EXP_V, total);
    let pages = [...Array(totalPages).keys()];
    if(totalPages > 7){ let st=Math.max(0,pg-3); let en=Math.min(totalPages,st+7); if(en-st<7)st=Math.max(0,en-7); pages=pages.slice(st,en); }
    el.innerHTML =
      `<span style="font-size:12px;color:#4a5568;margin-right:6px;">${s}–${e} de ${total}</span>`
      +`<button class="page-btn${pg===0?' disabled':''}" onclick="renderExportVendasList(${pg-1})" ${pg===0?'disabled':''}>&#8249;</button>`
      +pages.map(p2=>`<button class="page-btn${p2===pg?' active':''}" onclick="renderExportVendasList(${p2})">${p2+1}</button>`).join('')
      +`<button class="page-btn${pg===totalPages-1?' disabled':''}" onclick="renderExportVendasList(${pg+1})" ${pg===totalPages-1?'disabled':''}>&#8250;</button>`;
  }

  function _atualizarPreviewVendas(){
    const selecionados = _getSourceData().filter(p => _expVSelecionados.has(p.SKU));
    document.getElementById('exportVendasSelectedCount').textContent = selecionados.length;

    if(selecionados.length === 0){
      document.getElementById('exportVendasPreview').value = '';
      return;
    }

    const now     = new Date();
    const dataStr = now.toLocaleDateString('pt-BR');
    const horaStr = now.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});

    const recTotal    = selecionados.reduce((s,p) => s+(p.receita||0), 0);
    const qtdTotal    = selecionados.reduce((s,p) => s+(p.qtd||0), 0);
    const ticketMedio = selecionados.length > 0 ? recTotal / selecionados.length : 0;

    let linhas = [];
    linhas.push(`📦 RELATÓRIO DE VENDAS — ${dataStr} às ${horaStr}`);
    linhas.push('═'.repeat(52));
    linhas.push(`Total de produtos: ${selecionados.length}`);
    linhas.push(`Receita total:     ${fmt(recTotal)}`);
    linhas.push(`Qtd total vendida: ${fmtN(qtdTotal)} un`);
    linhas.push(`Ticket médio:      ${fmt(ticketMedio)}`);
    linhas.push('─'.repeat(52));

    selecionados.forEach((p, i) => {
      const ticket = p.qtd > 0 ? fmt(p.receita / p.qtd) : '—';
      linhas.push(`${String(i+1).padStart(3,'0')}. [${p.curva||'C'}] ${p.SKU} — ${p.produto||'-'}`);
      linhas.push(`     Receita: ${fmt(p.receita||0)}  |  Qtd: ${fmtN(p.qtd||0)} un  |  Ticket: ${ticket}`);
      linhas.push(`     Venda/Dia: ${(p.vd||0).toFixed(2)}  |  Cobertura: ${p.cobertura||0} dias  |  Estoque: ${fmtN(p.estoque||0)}`);
    });

    linhas.push('═'.repeat(52));
    document.getElementById('exportVendasPreview').value = linhas.join('\n');
  }

  window.exportVendasCopiar = function(){
    const txt = document.getElementById('exportVendasPreview').value;
    if(!txt) return;
    navigator.clipboard.writeText(txt).then(() => {
      const btn = document.getElementById('btnExportVendasCopiar');
      const orig = btn.textContent;
      btn.textContent = '✅ Copiado!';
      btn.style.color = '#34d399';
      setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 2000);
    }).catch(() => {
      document.getElementById('exportVendasPreview').select();
      document.execCommand('copy');
    });
  };

  window.exportVendasBaixar = function(){
    const txt = document.getElementById('exportVendasPreview').value;
    if(!txt) return;
    const now  = new Date();
    const nome = `vendas_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}.txt`;
    const blob = new Blob([txt], {type:'text/plain;charset=utf-8'});
    const a    = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = nome;
    a.click();
    URL.revokeObjectURL(a.href);
  };

})();
</script>

</body>
</html>
